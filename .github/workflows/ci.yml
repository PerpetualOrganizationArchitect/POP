name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  foundry-cicd:
    uses: BreadchainCoop/etherform/.github/workflows/_foundry-cicd.yml@e4ef95fbf0a980a069587c729a34bd1947e88bd9
    with:
      # CI Options
      check-formatting: true
      test-verbosity: 'vvv'

      # Slither Analysis
      run-slither: true
      slither-fail-on: 'high'

      # Coverage
      run-coverage: true
      coverage-source-filter: ' src/'

      # Upgrade Safety
      run-upgrade-safety: true
      baseline-path: 'upgrades/baseline'
      validation-script: 'script/upgrades/ValidateUpgrade.s.sol'

      # Automatic Deployments
      deploy-on-pr: false
      deploy-on-main: false
      deploy-script: 'script/DeployInfrastructure.s.sol:DeployInfrastructure'
      deployment-foundry-profile: 'production'
      network-config-path: '.github/deploy-networks.json'
      indexing-wait: 90
      flatten-contracts: true
      upgrades-path: 'upgrades'
    secrets:
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      RPC_URL: ${{ secrets.HOODI_RPC_URL }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
